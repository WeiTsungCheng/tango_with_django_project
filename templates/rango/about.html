
{% extends "rango/base.html" %}
{% load staticfiles %}

{% block title_block %}
    About Rango
{% endblock %}

{% block body_block %}
<div class="jumbotron p-4">
    <div class="container">
        <h1 class="jumbotron-heading">Rango says...</h1>
        <h2>
            Here is the about page.
        </h2>
        This tutorial has been put together by <br />
        Visits: {{ visits }}<br />

        <button class="btn btn-primary" onclick="alert('You clicked the button using inline JavaScript.');">
            Click me - I run on vanilla JavaScript!
        </button>

        <button class="btn btn-primary" id="about-btn">
            Click me - I'm using JQuery!
        </button>

        <div id="msg">Hello! I'm a further example for JQuery testing.</div>

        <div>
            <img src="{% static 'images/cat.jpg' %}" alt="Picture of a Cat" width="600">
        </div>
    </div>
</div>

{% endblock %}
